<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Status Code</title>
    <link rel="apple-touch-icon" href="image_28.png">
    <link rel="icon" type="image/png" href="image_28.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --c1xx: #3498db; --c2xx: #2ecc71; --c3xx: #f1c40f; --c4xx: #e67e22; --c5xx: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg); color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            -webkit-font-smoothing: antialiased;
        }

        .fridge-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; flex-grow: 1; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; margin-bottom: 5px; 
        }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; color: var(--main); }
        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: 12px;
        }

        .subtitle { font-size: 0.85rem; color: #999; font-weight: 700; margin-bottom: 25px; align-self: flex-start; }

        .search-box { width: 100%; margin-bottom: 15px; }
        input[type="number"] {
            width: 100%; padding: 20px; border-radius: var(--radius);
            border: 2px solid var(--accent); background: var(--input-bg);
            font-size: 2.8rem; font-weight: 900; text-align: center; color: var(--main);
            outline: none; -webkit-appearance: none; -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }
        input::placeholder { color: #bbb; -webkit-text-fill-color: #bbb; }

        .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .chip {
            background: var(--input-bg); border: 2px solid var(--accent); padding: 8px 14px; 
            border-radius: 10px; font-size: 0.75rem; font-weight: 800;
            color: var(--main); cursor: pointer; transition: 0.2s;
        }
        .chip:active { transform: scale(0.92); background: var(--main); color: #fff; }

        #resultArea { width: 100%; min-height: 250px; display: flex; flex-direction: column; }
        .card { 
            background: #fff; border: 3px solid var(--main); border-radius: var(--radius); 
            padding: 22px; animation: slideUp 0.3s ease; text-align: left;
        }
        .code-header { font-size: 1.2rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .group-tag { font-size: 0.6rem; padding: 4px 10px; border-radius: 15px; color: #fff; text-transform: uppercase; font-weight: 900; }
        
        .lang-list { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; }
        .lang-item { font-size: 0.95rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .lang-label { font-size: 0.6rem; background: var(--accent); color: #888; padding: 2px 6px; border-radius: 4px; min-width: 25px; text-align: center; }

        .advice-box { background: var(--input-bg); padding: 15px; border-radius: 12px; border-left: 4px solid var(--main); }
        .advice-box strong { font-size: 0.75rem; color: #999; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .advice-box p { font-size: 0.85rem; font-weight: 700; color: #555; line-height: 1.4; }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding: 30px 0 10px; width: 100%; }
        .kofi-btn, .home-btn {
            width: 100%; text-align: center; padding: 18px; border-radius: var(--radius);
            font-weight: 900; font-size: 0.9rem; text-decoration: none; cursor: pointer; border: none; -webkit-appearance: none;
        }
        .kofi-btn { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); -webkit-text-fill-color: var(--main); }

        footer { text-align: center; font-size: 0.7rem; color: #bbb; line-height: 1.6; font-weight: 600; }
        footer a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 35px; border-radius: var(--radius); max-width: 340px; width: 100%; position: relative; animation: slideUp 0.3s ease; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <h1>Status Code</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Quick reference for HTTP protocols.</p>

    <div class="search-box">
        <input type="number" id="codeInput" placeholder="404" min="100" max="599" autofocus>
    </div>

    <div class="quick-chips">
        <button class="chip" onclick="setVal(200)">200</button>
        <button class="chip" onclick="setVal(301)">301</button>
        <button class="chip" onclick="setVal(401)">401</button>
        <button class="chip" onclick="setVal(403)">403</button>
        <button class="chip" onclick="setVal(404)">404</button>
        <button class="chip" onclick="setVal(500)">500</button>
        <button class="chip" onclick="setVal(503)">503</button>
    </div>

    <div id="resultArea">
        <div style="text-align: center; color: #ccc; margin-top: 40px; font-weight: 900; font-size: 0.9rem;">TYPE OR TAP A CODE</div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-icon" id="closeModal">&times;</span>
        <h2 style="font-size: 1.3rem; font-weight: 900; margin-bottom: 20px;">📱 Install</h2>
        <div style="font-size: 0.85rem; line-height: 1.6; color: var(--main); font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:15px;">🤖 <strong>Android:</strong> Menu > Add to Home Screen</p>
        </div>
    </div>
</div>

<script>
    const codes = {
        200: ["OK", "c2xx", "Working fine", "正常です", "Todo bien", "一切正常", "The request was successful."],
        201: ["Created", "c2xx", "Resource created", "作成されました", "Creado", "已创建", "A new resource has been created."],
        301: ["Moved Permanently", "c3xx", "URL changed", "移転しました", "Movido", "永久移动", "The URL has changed permanently."],
        304: ["Not Modified", "c3xx", "Use cache", "更新なし", "No modificado", "未修改", "Nothing changed. Use your cache."],
        400: ["Bad Request", "c4xx", "Invalid request", "リクエスト不備", "Petición incorrecta", "错误请求", "Server cannot understand the request."],
        401: ["Unauthorized", "c4xx", "Login required", "ログインが必要", "No autorizado", "未授权", "Authentication is required to access."],
        403: ["Forbidden", "c4xx", "Access denied", "アクセス禁止", "Prohibido", "禁止访问", "You don't have permission for this."],
        404: ["Not Found", "c4xx", "Page not found", "見つかりません", "No encontrado", "未找到", "The URL doesn't exist. Check typos."],
        429: ["Too Many Requests", "c4xx", "Slow down", "制限超え", "Demasiadas peticiones", "请求过多", "You sent too many requests. Wait."],
        500: ["Server Error", "c5xx", "Server crashed", "システムエラー", "Error del servidor", "服务器错误", "Something went wrong on the server."],
        502: ["Bad Gateway", "c5xx", "Invalid response", "通信エラー", "Puerta de enlace", "錯誤網關", "Server received an invalid response."],
        503: ["Service Unavailable", "c5xx", "Server overloaded", "現在停止中", "No disponible", "服务不可用", "Server is down for maintenance."],
        504: ["Gateway Timeout", "c5xx", "Upstream timeout", "時間切れ", "Tiempo agotado", "网关超时", "A timeout occurred between servers."]
    };

    const input = document.getElementById('codeInput');
    const resArea = document.getElementById('resultArea');
    const modal = document.getElementById('modal');

    function setVal(v) {
        input.value = v;
        render(v.toString());
    }

    input.oninput = () => render(input.value);

    function render(val) {
        if (val.length === 3) {
            const data = codes[val];
            if (data) {
                const color = getComputedStyle(document.documentElement).getPropertyValue('--' + data[1]);
                resArea.innerHTML = `
                    <div class="card" style="border-color: ${color}">
                        <div class="code-header">
                            <span class="group-tag" style="background: ${color}">${val.charAt(0)}xx Group</span>
                            <strong>${val} ${data[0]}</strong>
                        </div>
                        <div class="lang-list">
                            <div class="lang-item"><span class="lang-label">EN</span> ${data[2]}</div>
                            <div class="lang-item"><span class="lang-label">JP</span> ${data[3]}</div>
                            <div class="lang-item"><span class="lang-label">ES</span> ${data[4]}</div>
                            <div class="lang-item"><span class="lang-label">CN</span> ${data[5]}</div>
                        </div>
                        <div class="advice-box" style="border-left-color: ${color}">
                            <strong>Advice</strong>
                            <p>${data[6]}</p>
                        </div>
                    </div>
                `;
            } else {
                resArea.innerHTML = `<div style="text-align: center; color: #e74c3c; margin-top: 40px; font-weight: 900; font-size: 0.9rem;">UNKNOWN CODE: ${val}</div>`;
            }
        } else {
            resArea.innerHTML = `<div style="text-align: center; color: #ccc; margin-top: 40px; font-weight: 900; font-size: 0.9rem;">TYPE OR TAP A CODE</div>`;
        }
    }

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch (e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
