<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Status Code</title>
    <link rel="apple-touch-icon" href="image_28.png">
    <link rel="icon" type="image/png" href="image_28.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg); color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            -webkit-font-smoothing: antialiased;
        }

        .fridge-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; flex-grow: 1; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; margin-bottom: 5px; 
        }
        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; color: var(--main); }
        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: 12px;
        }

        .subtitle { font-size: 0.85rem; color: #999; font-weight: 700; margin-bottom: 25px; align-self: flex-start; }

        .search-box { width: 100%; margin-bottom: 25px; position: relative; }
        input[type="number"] {
            width: 100%; padding: 25px; border-radius: var(--radius);
            border: 2px solid var(--accent); background: var(--input-bg);
            font-size: 2.5rem; font-weight: 900; text-align: center; color: var(--main);
            outline: none; -webkit-appearance: none; -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }
        input::placeholder { color: #ccc; -webkit-text-fill-color: #ccc; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        #resultArea { width: 100%; min-height: 200px; display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: var(--input-bg); border: 2px solid var(--accent); border-radius: var(--radius); 
            padding: 25px; animation: slideUp 0.3s ease; text-align: left;
        }
        .code-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .group-tag { font-size: 0.6rem; padding: 4px 10px; border-radius: 15px; color: #fff; text-transform: uppercase; font-weight: 900; }
        
        .c1xx { background: #3498db; } .c2xx { background: #2ecc71; }
        .c3xx { background: #f1c40f; } .c4xx { background: #e67e22; }
        .c5xx { background: #e74c3c; }

        .meaning { font-size: 1rem; line-height: 1.4; font-weight: 800; color: var(--main); margin-bottom: 15px; }
        .advice { font-size: 0.8rem; color: #777; border-top: 1px solid var(--accent); padding-top: 15px; font-weight: 600; line-height: 1.5; }

        .legend { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 25px; }
        .dot { height: 6px; border-radius: 10px; opacity: 0.3; }
        .dot.active { opacity: 1; transform: scaleY(1.5); }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding: 30px 0 10px; width: 100%; }
        .kofi-btn, .home-btn {
            width: 100%; text-align: center; padding: 18px; border-radius: var(--radius);
            font-weight: 900; font-size: 0.9rem; text-decoration: none; cursor: pointer; border: none; -webkit-appearance: none;
        }
        .kofi-btn { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); -webkit-text-fill-color: var(--main); }

        footer { font-size: 0.7rem; color: #bbb; text-align: center; line-height: 1.6; font-weight: 600; }
        footer a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 35px; border-radius: var(--radius); max-width: 340px; width: 100%; position: relative; animation: slideUp 0.3s ease; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <h1>Status Code</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">HTTP Protocol Reference</p>

    <div class="search-box">
        <input type="number" id="codeInput" placeholder="404" min="100" max="599" autofocus>
    </div>

    <div id="resultArea">
        <div style="text-align: center; color: #ccc; margin-top: 50px; font-weight: 800; font-size: 0.9rem;">ENTER 3-DIGIT CODE</div>
    </div>

    <div class="legend" id="legend">
        <div class="dot c1xx"></div><div class="dot c2xx"></div><div class="dot c3xx"></div><div class="dot c4xx"></div><div class="dot c5xx"></div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <h2 style="font-size: 1.3rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.5px;">📱 Install</h2>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 25px; font-weight: 600; line-height: 1.5;">Add to your home screen for instant access.</p>
        <div style="font-size: 0.85rem; line-height: 1.6; color: var(--main); font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:15px;">🤖 <strong>Android:</strong> Menu > Add to Home Screen</p>
        </div>
    </div>
</div>

<script>
    const codes = {
        100: ["Continue", "c1xx", "Request received, keep going.", "The server is waiting for the rest of the request."],
        101: ["Switching Protocols", "c1xx", "Switching to a different protocol.", "Common when upgrading to WebSockets."],
        200: ["OK", "c2xx", "Success! Everything is working fine.", "The standard response for successful HTTP requests."],
        201: ["Created", "c2xx", "Success! A new resource has been created.", "Common after a successful POST request."],
        204: ["No Content", "c2xx", "Success, but nothing to show.", "Server processed the request but returns no data."],
        301: ["Moved Permanently", "c3xx", "The URL has changed permanently.", "Automatically redirects to the new location."],
        302: ["Found", "c3xx", "The URL has changed temporarily.", "A temporary redirect to a different page."],
        304: ["Not Modified", "c3xx", "Nothing changed. Use your cache.", "Saves bandwidth by not re-downloading data."],
        400: ["Bad Request", "c4xx", "The server cannot understand the request.", "Check your parameters or syntax."],
        401: ["Unauthorized", "c4xx", "Authentication is required.", "You need to log in to access this page."],
        403: ["Forbidden", "c4xx", "You don't have permission to view this.", "Access is strictly denied by the server."],
        404: ["Not Found", "c4xx", "The page could not be found.", "The most famous error. Check the URL for typos."],
        405: ["Method Not Allowed", "c4xx", "The request method is not supported.", "e.g., trying to POST where only GET is allowed."],
        408: ["Request Timeout", "c4xx", "The server timed out waiting for you.", "Check your internet connection stability."],
        418: ["I'm a teapot", "c4xx", "I'm a teapot. Cannot brew coffee.", "An April Fools' joke. Yes, this is a real official code."],
        429: ["Too Many Requests", "c4xx", "Slow down! You've sent too many requests.", "You've hit the rate limit. Wait a bit."],
        500: ["Internal Server Error", "c5xx", "The server crashed or hit a bug.", "Something went wrong on the server's side."],
        502: ["Bad Gateway", "c5xx", "The server received an invalid response.", "Often happens when a server is restarting."],
        503: ["Service Unavailable", "c5xx", "Server is overloaded or down for maintenance.", "The server is temporarily unable to handle requests."],
        504: ["Gateway Timeout", "c5xx", "The upstream server failed to respond in time.", "A timeout between servers behind the scenes."]
    };

    const input = document.getElementById('codeInput');
    const resArea = document.getElementById('resultArea');
    const modal = document.getElementById('modal');
    const dots = document.querySelectorAll('.dot');

    input.oninput = () => {
        const val = input.value;
        dots.forEach(d => d.classList.remove('active'));
        
        if (val.length >= 1) {
            const group = val.charAt(0);
            const dot = document.querySelector('.c' + group + 'xx');
            if (dot) dot.classList.add('active');
        }

        if (val.length === 3) {
            const data = codes[val];
            if (data) {
                resArea.innerHTML = `
                    <div class="card">
                        <div class="code-title">
                            <span class="group-tag ${data[1]}">${val.charAt(0)}xx Group</span>
                            <strong>${data[0]}</strong>
                        </div>
                        <p class="meaning">${data[2]}</p>
                        <p class="advice">${data[3]}</p>
                    </div>
                `;
            } else {
                resArea.innerHTML = `<div style="text-align: center; color: #e74c3c; margin-top: 50px; font-weight: 800; font-size: 0.9rem;">Unknown Code: ${val}</div>`;
            }
        } else {
            resArea.innerHTML = `<div style="text-align: center; color: #ccc; margin-top: 50px; font-weight: 800; font-size: 0.9rem;">ENTER 3-DIGIT CODE</div>`;
        }
    };

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch (e) { /* 直接記述が生きる */ }
    }
    window.onload = loadFooter;
</script>

</body>
</html>
