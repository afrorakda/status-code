<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Status Code</title>
    <link rel="apple-touch-icon" href="image_28.png">
    <link rel="icon" type="image/png" href="image_28.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #fafafa;
            --radius: 15px;
            --border: #eee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            background-color: var(--bg); color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px calc(env(safe-area-inset-bottom, 10px) + 20px) 20px;
        }

        .fridge-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; }
        
        header { text-align: center; width: 100%; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; line-height: 1; color: var(--main); }
        .subtitle { font-size: 0.85rem; color: #999; font-weight: 600; margin-top: 5px; }

        .search-box { width: 100%; margin-bottom: 25px; }
        input[type="number"] {
            width: 100%; padding: 25px; border-radius: var(--radius);
            border: 2px solid var(--border); background: var(--accent);
            font-size: 2.5rem; font-weight: 800; text-align: center; color: var(--main);
            outline: none; transition: border-color 0.2s; -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus { border-color: var(--main); background: #fff; }

        #resultArea { width: 100%; min-height: 200px; display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: #fff; border: 2px solid var(--main); border-radius: var(--radius); 
            padding: 25px; animation: slideUp 0.3s ease; text-align: left;
        }
        .code-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .group-tag { font-size: 0.6rem; padding: 4px 10px; border-radius: 15px; color: #fff; text-transform: uppercase; font-weight: 800; }
        .meaning { font-size: 1rem; line-height: 1.5; font-weight: 700; color: var(--main); margin-bottom: 15px; }
        .advice { font-size: 0.85rem; color: #888; border-top: 1px solid #eee; padding-top: 15px; font-weight: 500; }

        .legend { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; }
        .dot { height: 4px; border-radius: 2px; }
        .c1xx { background: #3498db; } .c2xx { background: #2ecc71; }
        .c3xx { background: #f1c40f; } .c4xx { background: #e67e22; }
        .c5xx { background: #e74c3c; }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: auto; padding: 30px 0 10px; width: 100%; }
        .kofi-btn, .home-btn {
            width: 100%; text-align: center; padding: 18px;
            border-radius: var(--radius); font-weight: 800; font-size: 0.9rem; text-decoration: none;
            transition: 0.2s;
        }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: 1px solid var(--border); cursor: pointer; }
        .kofi-btn:active, .home-btn:active { transform: scale(0.98); opacity: 0.9; }

        footer { font-size: 0.7rem; color: #bbb; text-align: center; line-height: 1.6; margin-top: 15px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); max-width: 320px; width: 100%; position: relative; text-align: left; animation: slideUp 0.3s ease; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; padding: 5px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <h1>Status Code</h1>
        <p class="subtitle">Quick reference for HTTP protocols.</p>
    </header>

    <div class="search-box">
        <input type="number" id="codeInput" placeholder="404" min="100" max="599" autofocus>
    </div>

    <div id="resultArea">
        <div style="text-align: center; color: #ccc; margin-top: 40px; font-weight: 700;">Type 3-digit code</div>
    </div>

    <div class="legend">
        <div class="dot c1xx"></div><div class="dot c2xx"></div><div class="dot c3xx"></div><div class="dot c4xx"></div><div class="dot c5xx"></div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">🍵 Support me on Ko-fi</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <h2 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;"><span>📱</span> Install</h2>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px; font-weight: 500;">Add to your home screen for quick access.</p>
        <div style="font-size: 0.9rem; line-height: 1.6; color: var(--main);">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:12px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    const codes = {
        100: ["Continue", "c1xx", "Request received, keep going.", "The server is waiting for the rest of the request."],
        101: ["Switching Protocols", "c1xx", "Switching to a different protocol.", "Common when upgrading to WebSockets."],
        200: ["OK", "c2xx", "Success! Everything is working fine.", "The standard response for successful HTTP requests."],
        201: ["Created", "c2xx", "Success! A new resource has been created.", "Common after a successful POST request."],
        204: ["No Content", "c2xx", "Success, but nothing to show.", "Server processed the request but returns no data."],
        301: ["Moved Permanently", "c3xx", "The URL has changed permanently.", "Automatically redirects to the new location."],
        302: ["Found", "c3xx", "The URL has changed temporarily.", "A temporary redirect to a different page."],
        304: ["Not Modified", "c3xx", "Nothing changed. Use your cache.", "Saves bandwidth by not re-downloading data."],
        400: ["Bad Request", "c4xx", "The server cannot understand the request.", "Check your parameters or syntax."],
        401: ["Unauthorized", "c4xx", "Authentication is required.", "You need to log in to access this page."],
        403: ["Forbidden", "c4xx", "You don't have permission to view this.", "Access is strictly denied by the server."],
        404: ["Not Found", "c4xx", "The page could not be found.", "The most famous error. Check the URL for typos."],
        405: ["Method Not Allowed", "c4xx", "The request method is not supported.", "e.g., trying to POST where only GET is allowed."],
        408: ["Request Timeout", "c4xx", "The server timed out waiting for you.", "Check your internet connection stability."],
        418: ["I'm a teapot", "c4xx", "I'm a teapot. Cannot brew coffee.", "An April Fools' joke. Yes, this is a real official code."],
        429: ["Too Many Requests", "c4xx", "Slow down! You've sent too many requests.", "You've hit the rate limit. Wait a bit."],
        500: ["Internal Server Error", "c5xx", "The server crashed or hit a bug.", "Something went wrong on the server's side."],
        502: ["Bad Gateway", "c5xx", "The server received an invalid response.", "Often happens when a server is restarting."],
        503: ["Service Unavailable", "c5xx", "Server is overloaded or down for maintenance.", "The server is temporarily unable to handle requests."],
        504: ["Gateway Timeout", "c5xx", "The upstream server failed to respond in time.", "A timeout between servers behind the scenes."]
    };

    const input = document.getElementById('codeInput');
    const resArea = document.getElementById('resultArea');
    const modal = document.getElementById('modal');

    input.oninput = () => {
        const val = input.value;
        if (val.length === 3) {
            const data = codes[val];
            if (data) {
                resArea.innerHTML = `
                    <div class="card">
                        <div class="code-title">
                            <span class="group-tag ${data[1]}">${val} Group</span>
                            <strong>${data[0]}</strong>
                        </div>
                        <p class="meaning">${data[2]}</p>
                        <p class="advice">${data[3]}</p>
                    </div>
                `;
            } else {
                resArea.innerHTML = `<div style="text-align: center; color: #e74c3c; margin-top: 40px; font-weight: 700;">Unknown Code: ${val}</div>`;
            }
        } else {
            resArea.innerHTML = `<div style="text-align: center; color: #ccc; margin-top: 40px; font-weight: 700;">Type 3-digit code</div>`;
        }
    };

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
</script>

</body>
</html>
